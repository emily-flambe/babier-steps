<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Babier Steps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #controls-help {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.6);
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Left foot: <span id="left-status">planted</span></div>
    <div>Right foot: <span id="right-status">planted</span></div>
    <div>Distance: <span id="distance">0.0</span>m</div>
    <div>Progress: <span id="progress">0</span>%</div>
  </div>
  <div id="controls-help">
    Q - lift left foot&emsp;E - lift right foot<br>
    W/S - move raised foot forward/back<br>
    A/D - move raised foot left/right<br>
    R/F - move raised foot up/down<br>
    Arrow keys - lean body<br>
    Release Q/E - plant foot
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
